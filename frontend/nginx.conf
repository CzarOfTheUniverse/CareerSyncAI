# Serves the SPA and proxies API/WS/config/health routes to the backend.
# "backend" resolves to the backend service on the docker-compose network.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Runtime config + health probes
  location = /config  { proxy_pass http://backend:5000; }
  location = /healthz { proxy_pass http://backend:5000; }
  location = /readyz  { proxy_pass http://backend:5000; }

  # HTTP proxy for Vertex AI calls
  location /api-proxy { proxy_pass http://backend:5000; }

  # WebSocket bridge (BidiGenerateContent)
  location /ws-proxy {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
